info:
  name: login
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:8080/api/auth/login
  body:
    type: json
    data: |-
      {
        "username": "rajan",
        "password": "admin"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res.body.accessToken;
        bru.setEnvVar("token", token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
